<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-section { background: #2c3e50; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .btn-predict { background: #2c3e50; color: white; transition: 0.3s; }
        .btn-predict:hover { background: #1a252f; color: white; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; }
        .bg-canceled { background-color: #f8d7da; color: #721c24; }
        .bg-success { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-section text-center">
            <h3>🏨 Hotel Booking Status Predictor</h3>
        </div>
        <div class="card-body p-4">
            
            {% if result %}
            <div class="result-box {% if 'Not' in result %}bg-success{% else %}bg-canceled{% endif %}">
                Prediction: {{ result }}
            </div>
            {% endif %}

            <form action="/" method="POST" class="mt-4">
                <div class="row g-3">
                    <!-- Lead Time & Special Requests -->
                    <div class="col-md-6">
                        <label class="form-label">Lead Time (Days)</label>
                        <input type="number" name="lead_time" class="form-control" required min="0" value="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Special Requests</label>
                        <input type="number" name="no_of_special_requests" class="form-control" required min="0" value="0">
                    </div>

                    <!-- Pricing & Dates -->
                    <div class="col-md-4">
                        <label class="form-label">Avg Room Price ($)</label>
                        <input type="number" step="0.01" name="average_price_per_room" class="form-control" required min="0" value="100.00">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Arrival Month</label>
                        <select name="arrival_month" class="form-select">
                            {% for m in range(1, 13) %}
                            <option value="{{ m }}">{{ m }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Arrival Date</label>
                        <input type="number" name="arrival_date" class="form-control" required min="1" max="31" value="1">
                    </div>

                    <!-- Stay Duration -->
                    <div class="col-md-6">
                        <label class="form-label">Week Nights</label>
                        <input type="number" name="no_of_week_nights" class="form-control" required min="0" value="1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Weekend Nights</label>
                        <input type="number" name="no_of_weekend_nights" class="form-control" required min="0" value="0">
                    </div>

                    <!-- Categorical Inputs (Encoded as Integers) -->
                    <div class="col-md-4">
                        <label class="form-label">Market Segment</label>
                        <select name="market_segment_type" class="form-select">
                            <option value="1">Online</option>
                            <option value="2">Offline</option>
                            <option value="3">Corporate</option>
                            <option value="4">Aviation</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Meal Plan</label>
                        <select name="type_of_meal_plan" class="form-select">
                            <option value="1">Plan 1</option>
                            <option value="2">Plan 2</option>
                            <option value="3">No Meal</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Room Type</label>
                        <select name="room_type_reserved" class="form-select">
                            <option value="1">Type 1</option>
                            <option value="2">Type 2</option>
                            <option value="3">Type 3</option>
                            <option value="4">Type 4</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-predict w-100 py-2">Predict Booking Status</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
